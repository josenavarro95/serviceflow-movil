<style>
  :root {
    --terra:       #A0633A;
    --terra-dark:  #6B3F22;
    --terra-mid:   #C4895A;
    --terra-light: #EDD9C8;
    --terra-pale:  #F7EDE4;
    --sand:        #E8C9A0;
    --cream:       #FAF6F1;
    --espresso:    #1A1410;
    --espresso-mid:#2E2218;
    --text:        #2C1F14;
    --text-muted:  #8B6F5A;
    --text-faint:  #B89A85;
    --success:     #5A9970;
    --success-lt:  #EAF4EE;
    --danger:      #B85252;
    --danger-lt:   #FAECEC;
    --warning:     #B88040;
    --warning-lt:  #FAF0E0;
    --border:      #EAE0D8;
    --white:       #FFFFFF;
    --radius:      14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

  /* ===== LOGIN ===== */
  #loginScreen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; background: var(--espresso); padding: 24px;
  }
  .login-logo { font-family: Georgia, serif; font-size: 42px; color: var(--terra-mid); letter-spacing: 4px; margin-bottom: 6px; }
  .login-sub  { color: var(--sand); font-size: 13px; letter-spacing: 2px; margin-bottom: 40px; }
  .login-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 28px; width: 100%; max-width: 340px; }
  .login-card label { color: var(--sand); font-size: 12px; letter-spacing: 1px; display: block; margin-bottom: 8px; }
  .colaboradora-btn {
    display: flex; align-items: center; gap: 12px; width: 100%;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
    cursor: pointer; transition: all 0.2s; color: var(--white); font-size: 15px;
  }
  .colaboradora-btn:hover { background: rgba(160,99,58,0.3); border-color: var(--terra-mid); }
  .colaboradora-btn .avatar {
    width: 36px; height: 36px; border-radius: 50%; background: var(--terra-dark);
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: var(--sand);
    flex-shrink: 0;
  }
  .pass-field { margin-top: 16px; }
  .pass-field input { width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 12px 16px; color: var(--white); font-size: 16px; outline: none; }
  .pass-field input::placeholder { color: rgba(255,255,255,0.3); }
  .btn-login { margin-top: 14px; width: 100%; background: var(--terra); border: none; border-radius: 12px; padding: 14px; color: var(--white); font-size: 16px; font-weight: 600; cursor: pointer; }
  .login-err { color: #ff8888; font-size: 13px; margin-top: 10px; text-align: center; min-height: 20px; }

  /* ===== APP PRINCIPAL ===== */
  #appScreen { display: none; min-height: 100vh; flex-direction: column; }

  /* Header */
  .app-header {
    background: var(--espresso); color: var(--white); padding: 16px 20px 14px;
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 100;
  }
  .app-header-title { font-family: Georgia, serif; font-size: 20px; color: var(--terra-mid); }
  .app-header-user { font-size: 12px; color: var(--sand); }
  .btn-logout-sm { background: none; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 6px 10px; color: rgba(255,255,255,0.6); font-size: 12px; cursor: pointer; }

  /* Notificación badge */
  .notif-badge {
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--danger); color: white; border-radius: 50%; width: 18px; height: 18px;
    font-size: 11px; font-weight: 700; margin-left: 4px; vertical-align: middle;
  }

  /* Bottom nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--white); border-top: 1px solid var(--border);
    display: flex; z-index: 100;
    box-shadow: 0 -4px 20px rgba(44,31,20,0.08);
  }
  .bottom-nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 10px 4px 12px; cursor: pointer; color: var(--text-faint); transition: color 0.2s;
    font-size: 11px; gap: 4px; position: relative;
  }
  .bottom-nav-item.active { color: var(--terra); }
  .bottom-nav-item svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* Contenido */
  .app-content { padding: 16px 16px 90px; }

  /* Cards */
  .card { background: var(--white); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; box-shadow: 0 2px 12px rgba(44,31,20,0.06); }
  .card-title { font-weight: 700; font-size: 16px; color: var(--text); margin-bottom: 14px; }

  /* Cita card */
  .cita-card {
    background: var(--white); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
    border-left: 4px solid var(--terra); box-shadow: 0 2px 8px rgba(44,31,20,0.06);
  }
  .cita-card.nueva { border-left-color: var(--warning); background: var(--warning-lt); }
  .cita-card.pasada { border-left-color: var(--border); opacity: 0.7; }
  .cita-hora { font-size: 22px; font-weight: 700; color: var(--terra); }
  .cita-nombre { font-size: 16px; font-weight: 600; margin: 2px 0; }
  .cita-meta { font-size: 12px; color: var(--text-muted); }
  .badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-nueva { background: var(--warning-lt); color: var(--warning); }
  .badge-confirmada { background: var(--success-lt); color: var(--success); }
  .badge-mi-cita { background: var(--terra-pale); color: var(--terra-dark); }

  /* Formulario */
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.5px; text-transform: uppercase; }
  .form-control { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 14px; font-size: 15px; color: var(--text); background: var(--white); outline: none; -webkit-appearance: none; }
  .form-control:focus { border-color: var(--terra); }
  select.form-control { cursor: pointer; }

  /* Botones */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 13px 20px; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
  .btn-primary { background: var(--terra); color: var(--white); width: 100%; }
  .btn-primary:active { background: var(--terra-dark); }
  .btn-outline { background: transparent; color: var(--terra); border: 1.5px solid var(--terra); width: 100%; }
  .btn-danger { background: var(--danger-lt); color: var(--danger); }

  /* Sección agendamiento */
  .time-picker-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 4px; }
  .time-btn { border: 1.5px solid var(--border); background: var(--white); border-radius: 8px; padding: 10px 4px; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; color: var(--text-muted); }
  .time-btn.selected { background: var(--terra); color: var(--white); border-color: var(--terra); }
  .time-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Modal de éxito */
  #modalExito { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 9999; align-items: center; justify-content: center; padding: 20px; }
  .modal-exito-box { background: var(--white); border-radius: 20px; padding: 32px 24px; text-align: center; max-width: 320px; width: 100%; }
  .modal-exito-icon { font-size: 52px; margin-bottom: 12px; }

  /* Alerta notificación */
  .notif-alerta { background: var(--warning-lt); border: 1px solid var(--warning); border-radius: 12px; padding: 14px 16px; margin-bottom: 14px; display: flex; gap: 10px; align-items: flex-start; }
  .notif-alerta-icon { font-size: 20px; flex-shrink: 0; }

  /* Panel vacío */
  .empty { text-align: center; padding: 40px 20px; color: var(--text-faint); }
  .empty-icon { font-size: 40px; margin-bottom: 10px; opacity: 0.5; }

  /* Toast */
  .toast-m { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--espresso); color: var(--white); padding: 12px 20px; border-radius: 10px; font-size: 14px; z-index: 9998; opacity: 0; transition: opacity .3s; white-space: nowrap; }
  .toast-m.show { opacity: 1; }

  /* Animaciones */
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .slide-up { animation: slideUp 0.3s ease; }
</style>

<script>
// =============================================
// DATOS / CONSTANTES
// =============================================
const HORAS = ['08:00','08:30','09:00','09:30','10:00','10:30','11:00','11:30','12:00','12:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00'];
const USUARIOS = {
  maritza: { pass: 'maritza123', nombre: 'Maritza Navarro', rol: 'Colaboradora' },
  mary:    { pass: 'mary123',    nombre: 'Mary Pita',       rol: 'Colaboradora' },
  genesis: { pass: 'genesis123', nombre: 'Genesis Pita',    rol: 'Colaboradora' }
};
const INICIALES = { 'Maritza Navarro': 'MN', 'Mary Pita': 'MP', 'Genesis Pita': 'GP' };

let sesion = null;
let usuarioSeleccionado = null;

// ===== TIMER DE INACTIVIDAD =====
const INACTIVIDAD_MS = 5 * 60 * 1000; // 5 minutos
const AVISO_ANTES_MS = 30 * 1000; // aviso a 30 segundos del cierre
let timerInactividad = null;
let timerAviso = null;
let timerCuenta = null;
let ultimoReseteoTimer = 0;

// =============================================
// LOCALSTORAGE (usa mismas claves que PRAIA)
// =============================================
function cargarDato(key, def) {
  try { const d = localStorage.getItem(key); return d ? JSON.parse(d) : def; } catch(e) { return def; }
}

function guardarDato(key, val) {
  try {
    localStorage.setItem(key, JSON.stringify(val));
    console.log('✅ Guardado en localStorage:', key);
  } catch(e) { console.log('❌ Error localStorage:', e); }

  // Sincronizar citas con Firebase
  if (key === 'praia_citas' && window.firebaseDb) {
    console.log('📤 Enviando citas a Firebase...');
    guardarEnFirestore(val);
  }
}

function guardarEnFirestore(datos) {
  if (!window.firebaseDb) {
    console.log('⚠️ Firebase no inicializado');
    return;
  }

  try {
    console.log('📝 Preparando datos para Firebase:', datos.length, 'citas');

    window.firebaseDb.collection('salon').doc('citas').set({
      items: datos,
      timestamp: new Date().toISOString()
    }).then(() => {
      console.log('✅ Citas guardadas en Firebase correctamente');
    }).catch(e => {
      console.error('❌ Error guardando en Firebase:', e);
      console.log('Reintentar en 2 segundos...');
      setTimeout(() => guardarEnFirestore(datos), 2000);
    });
  } catch (e) {
    console.error('❌ Error crítico en guardarEnFirestore:', e);
  }
}

// Sincronizar cambios de Firebase - VERSIÓN INTELIGENTE
function sincronizarFirestore() {
  if (!window.firebaseDb) {
    console.log('Firebase no disponible');
    return;
  }

  function cargarDelFirestore() {
    try {
      window.firebaseDb.collection('salon').doc('citas').get()
        .then(snap => {
          if (!snap.exists || !snap.data()) return;

          const datosFirebase = snap.data().items || [];
          let citasLocal = cargarDato('praia_citas', []);
          let cambios = false;

          // Merge inteligente: agregar/actualizar citas de Firebase
          for (const citaFB of datosFirebase) {
            const idx = citasLocal.findIndex(c => String(c.id) === String(citaFB.id));
            if (idx === -1) {
              // Cita nueva en Firebase (creada desde otro dispositivo)
              citasLocal.push(citaFB);
              cambios = true;
              console.log('✅ Cita nueva desde Firebase:', citaFB.id);
            }
            // Si existe localmente, mantenemos la versión local (no sobrescribimos)
          }

          // Remover citas que fueron eliminadas en Firebase
          const citasLocalFiltradas = citasLocal.filter(c => {
            const existeEnFB = datosFirebase.find(fb => String(fb.id) === String(c.id));
            if (!existeEnFB && c.agendadoPor === sesion.nombre) {
              // Era nuestra cita y fue eliminada desde PC
              cambios = true;
              console.log('🗑️ Cita eliminada desde otro dispositivo:', c.id);
              return false;
            }
            return true;
          });

          if (cambios) {
            citas = citasLocalFiltradas;
            localStorage.setItem('praia_citas', JSON.stringify(citas));
            renderMisCitas();
            renderAgenda();
            verificarNotificaciones();
            console.log('🔄 Sincronización completada:', citas.length, 'citas');
          }
        })
        .catch(e => console.error('Error Firebase:', e.message));

    } catch (e) {
      console.error('Error sincronización:', e);
    }
  }

  cargarDelFirestore();
  setInterval(cargarDelFirestore, 3000);
}

// ===== FUNCIONES DE INACTIVIDAD =====
function iniciarTimerInactividad() {
  detenerTimerInactividad();
  timerAviso = setTimeout(mostrarAvisoInactividad, INACTIVIDAD_MS - AVISO_ANTES_MS);
  timerInactividad = setTimeout(() => {
    ocultarAvisoInactividad();
    doLogout();
    toast('Sesión cerrada por inactividad', 'warning');
  }, INACTIVIDAD_MS);
}

function detenerTimerInactividad() {
  clearTimeout(timerInactividad);
  clearTimeout(timerAviso);
  clearInterval(timerCuenta);
  timerInactividad = timerAviso = timerCuenta = null;
}

function resetearTimerInactividad() {
  if (!sesion) return;
  const aviso = document.getElementById('avisoInactividadMovil');
  if (aviso && aviso.style.display !== 'none') return;

  // Debounce: solo resetear si han pasado más de 5 segundos desde el último reseteo
  const ahora = Date.now();
  if (ahora - ultimoReseteoTimer < 5000) return;
  ultimoReseteoTimer = ahora;

  iniciarTimerInactividad();
}

function mostrarAvisoInactividad() {
  const aviso = document.getElementById('avisoInactividadMovil');
  if (!aviso) return;
  let seg = 30;
  const cuentaEl = document.getElementById('cuentaAtrasMovil');
  if (cuentaEl) cuentaEl.textContent = seg;
  aviso.style.display = 'flex';
  timerCuenta = setInterval(() => {
    seg--;
    const el = document.getElementById('cuentaAtrasMovil');
    if (el) el.textContent = seg;
    if (seg <= 0) clearInterval(timerCuenta);
  }, 1000);
}

function ocultarAvisoInactividad() {
  clearInterval(timerCuenta);
  const aviso = document.getElementById('avisoInactividadMovil');
  if (aviso) aviso.style.display = 'none';
}

function doLogin() {
  const u = usuarioSeleccionado;
  const p = document.getElementById('loginPass').value;
  if (!u) { document.getElementById('loginErr').textContent = 'Selecciona un perfil'; return; }
  if (!USUARIOS[u] || USUARIOS[u].pass !== p) { document.getElementById('loginErr').textContent = 'Contraseña incorrecta'; return; }
  sesion = { usuario: u, nombre: USUARIOS[u].nombre, rol: USUARIOS[u].rol };
  guardarDato('praia_movil_sesion', sesion);
  iniciarTimerInactividad();
  mostrarApp();
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// Escuchar actividad del usuario para resetear timer de inactividad
['mousedown','keydown','touchstart','click'].forEach(ev => {
  document.addEventListener(ev, () => { if (sesion) resetearTimerInactividad(); }, { passive: true });
});

function doLogout() {
  detenerTimerInactividad();
  guardarDato('praia_movil_sesion', null);
  sesion = null;
  location.reload();
}

function mostrarApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'flex';
  document.getElementById('appScreen').style.flexDirection = 'column';
  document.getElementById('headerUser').textContent = sesion.nombre;

  // IMPORTANTE: Cargar desde Firebase ANTES de renderizar
  console.log('📲 Sincronizando datos desde Firebase...');
  if (window.firebaseDb) {
    window.firebaseDb.collection('salon').doc('citas').get().then(snap => {
      if (snap.exists) {
        const datosFirebase = snap.data().items || [];
        if (datosFirebase.length > 0) {
          citas = datosFirebase;
          localStorage.setItem('praia_citas', JSON.stringify(citas));
          console.log('✅ Citas cargadas desde Firebase:', citas.length);
          renderMisCitas();
          renderAgenda();
        }
      }
    }).catch(e => console.log('Error cargando de Firebase:', e));
  }

  // Luego, escuchar cambios en tiempo real cada 5 segundos
  sincronizarFirestore();

  // Inicializar fecha
  const hoy = new Date().toISOString().split('T')[0];
  document.getElementById('agFechaMovil').value = hoy;
  document.getElementById('agendaFiltroFecha').value = hoy;
  document.getElementById('agendaFiltroEstado').value = 'todas';
  document.getElementById('agendaFiltroEmpleada').value = 'todas';
  document.getElementById('fechaHoyLabel').textContent = new Date().toLocaleDateString('es-EC', { weekday: 'long', day: 'numeric', month: 'long' });

  // Renderizar agenda inicial
  renderAgenda();

  // Pre-seleccionar colaboradora en agendar (para el usuario actual si es colaboradora)
  if (sesion.rol === 'Colaboradora') {
    const sel = document.getElementById('agParaColaboradora');
    for (let o of sel.options) if (o.value === sesion.nombre) { o.selected = true; break; }
  }

  buildTimePicker();
  verificarNotificaciones();
  renderMisCitas();
  renderAgenda();
}

// =============================================
// NOTIFICACIONES
// =============================================
function verificarNotificaciones() {
  const citas = cargarDato('praia_citas', []);
  const llaveLectura = 'praia_citas_vistas_' + sesion.usuario;
  const vistas = cargarDato(llaveLectura, []);
  const nuevasMias = citas.filter(c =>
    c.colaboradora === sesion.nombre &&
    !vistas.includes(c.id) &&
    c.agendadoPor !== sesion.nombre
  );
  const badge = document.getElementById('notifBadge');
  if (nuevasMias.length > 0) {
    // 📳 VIBRACIÓN cuando hay nuevas citas
    if (navigator.vibrate) {
      navigator.vibrate([400, 150, 400]); // Dos vibraciones muy fuertes
    }
    badge.style.display = 'inline-flex';
    badge.textContent = nuevasMias.length;
    const alertaBox = document.getElementById('notifAlertaBox');
    alertaBox.innerHTML = `
      <div class="notif-alerta">
        <div class="notif-alerta-icon">🔔</div>
        <div>
          <strong>Tienes ${nuevasMias.length} cita${nuevasMias.length>1?'s':''} nueva${nuevasMias.length>1?'s':''}</strong>
          <div style="font-size:12px;color:var(--text-muted);margin-top:3px">
            ${nuevasMias.map(c => `${c.hora} · ${c.cliente}`).join('<br>')}
          </div>
          <button onclick="marcarCitasComoVistas()" style="margin-top:8px;background:none;border:1px solid var(--warning);border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;color:var(--warning)">Marcar como vistas</button>
        </div>
      </div>`;
  } else {
    badge.style.display = 'none';
    document.getElementById('notifAlertaBox').innerHTML = '';
  }
}

function marcarCitasComoVistas() {
  const citas = cargarDato('praia_citas', []);
  const llave = 'praia_citas_vistas_' + sesion.usuario;
  const vistas = cargarDato(llave, []);
  const nuevasIds = citas
    .filter(c => c.colaboradora === sesion.nombre && !vistas.includes(c.id))
    .map(c => c.id);
  guardarDato(llave, [...vistas, ...nuevasIds]);
  verificarNotificaciones();
  toast('Citas marcadas como vistas');
}

// =============================================
// MIS CITAS
// =============================================
function renderMisCitas() {
  const citas = cargarDato('praia_citas', []);
  const hoy = new Date().toISOString().split('T')[0];
  const llaveLectura = 'praia_citas_vistas_' + sesion.usuario;
  const vistas = cargarDato(llaveLectura, []);

  const misCitasHoy = citas.filter(c => c.colaboradora === sesion.nombre && c.fecha === hoy)
    .sort((a,b) => a.hora.localeCompare(b.hora));

  const misCitasProx = citas.filter(c => c.colaboradora === sesion.nombre && c.fecha > hoy)
    .sort((a,b) => a.fecha === b.fecha ? a.hora.localeCompare(b.hora) : a.fecha.localeCompare(b.fecha));

  const renderCita = (c) => {
    const esNueva = !vistas.includes(c.id) && c.agendadoPor !== sesion.nombre;
    const ahora = new Date(); const horaPartes = c.hora.split(':');
    const horaCita = new Date(); horaCita.setHours(+horaPartes[0], +horaPartes[1], 0);
    const pasada = c.fecha < hoy || (c.fecha === hoy && horaCita < ahora);
    return `
      <div class="cita-card ${esNueva?'nueva':''} ${pasada&&!esNueva?'pasada':''}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div class="cita-hora">${c.hora}</div>
          <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end">
            ${esNueva ? '<span class="badge badge-nueva">🔔 Nueva</span>' : ''}
            ${c.confirmado ? '<span class="badge badge-confirmada">✓ Confirmada</span>' : ''}
          </div>
        </div>
        <div class="cita-nombre">${c.cliente}</div>
        <div class="cita-meta">${c.servicio}${c.telefono?' · '+c.telefono:''}</div>
        ${c.fecha !== hoy ? `<div style="font-size:12px;color:var(--terra);margin-top:4px">📅 ${c.fecha}</div>` : ''}
        ${c.observaciones ? `<div style="font-size:12px;color:var(--text-muted);margin-top:4px;font-style:italic">📝 ${c.observaciones}</div>` : ''}
        ${c.agendadoPor && c.agendadoPor !== sesion.nombre ? `<div style="font-size:11px;color:var(--text-faint);margin-top:4px">Agendado por: ${c.agendadoPor}</div>` : ''}
        <div style="display:flex;gap:8px;margin-top:10px">
          ${!c.confirmado ? `<button onclick="confirmarCitaMovil('${c.id}')" style="flex:1;padding:8px;background:var(--success-lt);color:var(--success);border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">✓ Confirmar</button>` : ''}
          <button onclick="cancelarCitaMovil('${c.id}')" style="flex:1;padding:8px;background:var(--danger-lt);color:var(--danger);border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">✕ Cancelar</button>
        </div>
      </div>`;
  };

  const elHoy = document.getElementById('misCitasHoy');
  elHoy.innerHTML = misCitasHoy.length
    ? misCitasHoy.map(renderCita).join('')
    : '<div class="empty"><div class="empty-icon">📅</div>Sin citas para hoy</div>';

  const elProx = document.getElementById('misCitasProximas');
  elProx.innerHTML = misCitasProx.length
    ? misCitasProx.map(renderCita).join('')
    : '<div style="color:var(--text-faint);font-size:13px;padding:10px 0">Sin citas próximas</div>';
}

function confirmarCitaMovil(id) {
  const citas = cargarDato('praia_citas', []);
  const idStr = String(id);
  const c = citas.find(c => String(c.id) === idStr);
  if (c) { c.confirmado = true; guardarDato('praia_citas', citas); renderMisCitas(); renderAgenda(); toast('Cita confirmada'); }
}

function cancelarCitaMovil(id) {
  if (!confirm('¿Cancelar esta cita?')) return;
  let citas = cargarDato('praia_citas', []);
  const idStr = String(id);

  // Marcar como eliminada localmente con timestamp
  citas = citas.filter(c => String(c.id) !== idStr);
  guardarDato('praia_citas', citas);

  // Guardar en Firebase inmediatamente
  if (window.firebaseDb) {
    window.firebaseDb.collection('salon').doc('citas').set({ items: citas })
      .then(() => {
        console.log('✅ Cita eliminada en Firebase');
        toast('Cita cancelada');
      })
      .catch(e => {
        console.error('❌ Error al eliminar en Firebase:', e.message);
        toast('Error al sincronizar eliminación', 'error');
      });
  } else {
    toast('Cita cancelada');
  }

  renderMisCitas();
  renderAgenda();
}

// =============================================
// AGENDA GENERAL
// =============================================
function renderAgenda() {
  const filtroEstado = document.getElementById('agendaFiltroEstado').value || 'todas';
  const filtroFecha = document.getElementById('agendaFiltroFecha').value;
  const filtroEmpleada = document.getElementById('agendaFiltroEmpleada').value || 'todas';

  let citas = cargarDato('praia_citas', []);

  // Aplicar filtros
  if (filtroEstado !== 'todas') {
    citas = citas.filter(c => (c.estado || 'pendiente') === filtroEstado);
  }
  if (filtroFecha) {
    citas = citas.filter(c => c.fecha === filtroFecha);
  }
  if (filtroEmpleada !== 'todas') {
    citas = citas.filter(c => c.colaboradora === filtroEmpleada);
  }

  citas = citas.sort((a,b) => (a.fecha+a.hora).localeCompare(b.fecha+b.hora));

  const el = document.getElementById('agendaGeneral');
  if (!citas.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📅</div>Sin citas con los filtros seleccionados</div>';
    return;
  }

  el.innerHTML = citas.map(c => {
    const estadoColor = c.estado === 'completada' ? 'var(--success)' : c.estado === 'cancelada' ? 'var(--danger)' : 'var(--warning)';
    const estadoLabel = c.estado === 'completada' ? 'Completada' : c.estado === 'cancelada' ? 'Cancelada' : 'Pendiente';
    return `
      <div class="cita-card" style="${c.colaboradora===sesion.nombre?'border-left-color:var(--terra)':'border-left-color:var(--border)'}">
        <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px">
          <div>
            <strong>${c.cliente}</strong>
            <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${c.fecha} · ${c.hora}</div>
          </div>
          <span style="background:${estadoColor};color:white;font-size:10px;padding:3px 8px;border-radius:4px;font-weight:600">${estadoLabel}</span>
        </div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:6px">✂️ ${c.servicio}</div>
        <div style="font-size:12px;color:var(--text-muted)">👤 ${c.colaboradora}</div>
        ${c.observaciones ? `<div style="font-size:11px;color:var(--terra);margin-top:6px;font-style:italic">📝 ${c.observaciones}</div>` : ''}
        ${c.colaboradora===sesion.nombre ? '<span class="badge badge-mi-cita" style="margin-top:8px">Mi cita</span>' : ''}
      </div>`;
  }).join('');
}

// =============================================
// AGENDAR CITA
// =============================================
function buildTimePicker() {
  const grid = document.getElementById('timePickerGrid');
  grid.innerHTML = HORAS.map(h => `<button class="time-btn" onclick="seleccionarHora('${h}')">${h}</button>`).join('');
}

function seleccionarHora(h) {
  document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  document.getElementById('agHoraMovil').value = h;
}

function agendarCita() {
  const colaboradora = document.getElementById('agParaColaboradora').value;
  const cliente = document.getElementById('agClienteNombre').value.trim();
  const telefono = document.getElementById('agClienteTelefono').value.trim();
  const servicio = document.getElementById('agServicioMovil').value;
  const fecha = document.getElementById('agFechaMovil').value;
  const hora = document.getElementById('agHoraMovil').value;
  const obs = document.getElementById('agObsMovil').value.trim();

  if (!cliente) { toast('Ingresa el nombre del cliente'); return; }
  if (!fecha) { toast('Selecciona una fecha'); return; }
  if (!hora) { toast('Selecciona una hora'); return; }

  // Verificar si la colaboradora ya tiene cita a esa hora
  const citas = cargarDato('praia_citas', []);
  const choque = citas.find(c => c.colaboradora === colaboradora && c.fecha === fecha && c.hora === hora);
  if (choque) { toast(`${colaboradora} ya tiene una cita a las ${hora}`, 'error'); return; }

  const nuevaCita = {
    id: 'movil_' + Date.now(),
    colaboradora,
    cliente,
    telefono,
    servicio,
    fecha,
    hora,
    observaciones: obs,
    agendadoPor: sesion.nombre,
    confirmado: false,
    timestamp: Date.now()
  };

  citas.push(nuevaCita);
  guardarDato('praia_citas', citas);

  // Guardar en Firebase inmediatamente
  if (window.firebaseDb) {
    window.firebaseDb.collection('salon').doc('citas').set({ items: citas })
      .catch(e => console.error('Error guardando en Firebase:', e.message));
  }

  // Enviar notificación push a ntfy si es para otra persona
  const esParaOtra = colaboradora !== sesion.nombre;
  if (esParaOtra) {
    enviarNotificacionNtfy(colaboradora, cliente, fecha, hora, servicio);
  }

  // Limpiar formulario
  document.getElementById('agClienteNombre').value = '';
  document.getElementById('agClienteTelefono').value = '';
  document.getElementById('agObsMovil').value = '';
  document.getElementById('agHoraMovil').value = '';
  document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));

  // Mostrar éxito
  document.getElementById('modalExitoMensaje').innerHTML = `
    <strong>${cliente}</strong> fue agendado/a con<br>
    <strong>${colaboradora}</strong><br>
    el <strong>${fecha}</strong> a las <strong>${hora}</strong>
    ${esParaOtra ? '<br><br>🔔 Se notificará a ' + colaboradora : ''}`;
  document.getElementById('modalExito').style.display = 'flex';

  renderMisCitas();
  renderAgenda();
}


function enviarNotificacionNtfy(colaboradora, cliente, fecha, hora, servicio) {
  // Mapear nombre de colaboradora a topic de ntfy
  const topicMap = {
    'Maritza Navarro': 'praia-maritza',
    'Mary Pita': 'praia-mary',
    'Genesis Pita': 'praia-genesis'
  };
  const topic = topicMap[colaboradora];
  if (!topic) {
    console.log('❌ Colaboradora no encontrada:', colaboradora);
    return;
  }

  // Formatear fecha para que sea legible
  const fechaObj = new Date(fecha + 'T00:00:00');
  const fechaFormato = fechaObj.toLocaleDateString('es-EC', { weekday: 'short', month: 'short', day: 'numeric' });

  // Mensaje para la notificación
  const mensaje = `🔔 NUEVA CITA\n${hora} · ${fechaFormato}\n👤 ${cliente}\n✂️ ${servicio}`;

  console.log('📤 Enviando notificación a:', topic);
  console.log('📝 Mensaje:', mensaje);

  // Enviar a ntfy.sh (no requiere autenticación)
  fetch(`https://ntfy.sh/${topic}`, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: mensaje
  })
  .then(r => {
    toast('🔔 Notificación enviada a ' + colaboradora, 'success');
    console.log('✅ Notificación enviada a ntfy.sh:', topic);
  })
  .catch(e => {
    toast('⚠️ Error en notificación para ' + colaboradora, 'warning');
    console.error('❌ Error enviando notificación:', e);
  });
}

function cerrarModalExito() {
  document.getElementById('modalExito').style.display = 'none';
  showPag('miscitas');
}

// =============================================
// NAVEGACIÓN
// =============================================
function showPag(id) {
  document.querySelectorAll('[id^="pag-"]').forEach(p => p.style.display = 'none');
  document.querySelectorAll('.bottom-nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('pag-' + id).style.display = 'block';
  document.getElementById('nav-' + id).classList.add('active');
  if (id === 'miscitas') { verificarNotificaciones(); renderMisCitas(); }
  if (id === 'agenda') renderAgenda();
}

// =============================================
// TOAST
// =============================================
function toast(msg) {
  const t = document.getElementById('toastM');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

  <div style="background:var(--white);border-radius:20px;padding:32px 24px;max-width:320px;width:90%;text-align:center;box-shadow:0 12px 40px rgba(44,31,20,0.14);">
    <div style="width:50px;height:50px;background:var(--warning-lt);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--warning)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </div>
    <div style="font-family:'Segoe UI',sans-serif;font-size:18px;font-weight:600;color:var(--text);margin-bottom:6px">Sesión por vencer</div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:18px;line-height:1.5">
      Por seguridad, tu sesión se cerrará en<br>
      <span style="font-size:32px;font-weight:700;color:var(--warning);display:block;margin:8px 0;line-height:1" id="cuentaAtrasMovil">30</span>
      segundos por inactividad.
    </div>
    <button onclick="ocultarAvisoInactividad(); iniciarTimerInactividad();" style="width:100%;padding:12px 16px;background:var(--terra);color:var(--terra-pale);border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:8px">
      Seguir en sesión
    </button>
    <button onclick="doLogout()" style="width:100%;padding:12px 16px;background:transparent;color:var(--danger);border:1px solid var(--danger);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer">
      Cerrar sesión
    </button>
  </div>
</div>

</body>
</html>
